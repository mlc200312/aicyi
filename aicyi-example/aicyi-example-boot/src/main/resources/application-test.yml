                virtual-host: /

  # RabbitMQ原生配置
  rabbitmq:
    dynamic: false
    template:
      retry:
        enabled: true
        max-attempts: 3
        initial-interval: 1000ms
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          stateless: true

