server:
  port: 80

mybatis:
  configuration:
    #    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    log-impl: io.github.aicyi.midware.db.commons.ibatis.IbatisLogger

spring:
  profiles:
    active: test
  application:
    name: aicyi-example-boot
  #    datasource:
  #    dynamic:
  #      druid:
  #        initial-size: 5
  #        min-idle: 5
  #        max-wait: 60000
  #        max-active: 20
  #        min-evictable-idle-time-millis: 300000
  #        time-between-eviction-runs-millis: 60000
  #        validation-query: SELECT 1 FROM DUAL
  #        init-connection-sqls: SET NAMES utf8mb4
  #        # 下面这两个配置，可以在每次连接的时候判断一些连接是否有效
  #        test-on-borrow: true
  #        test-while-idle: true
  # redis配置
  redis:
    jedis:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0
  mvc:
    path-match:
      matching-strategy: ant_path_matcher

  cloud:
    stream:
      # 绑定配置
      bindings:
        message-output:
          destination: default.exchange
          group: default.queue
          content-type: application/json
          binder: rabbit
          producer:
            required-groups: default.queue # 确保消费者组存在

        delayed-output:
          destination: delayed.exchange
          group: delayed.queue
          binder: rabbit

        direct-output:
          destination: direct.exchange
          group: direct.queue
          binder: rabbit

        topic-output:
          destination: topic.exchange
          content-type: application/json
          binder: rabbit

      # RabbitMQ特定配置
      rabbit:
        bindings:
          message-output:
            producer:
              exchange-type: topic # 消息模式：topic
              delayed-exchange: false # 不自动声明延迟交换机
              declare-exchange: false # 不自动声明交换机
              bind-queue: false # 不自动绑定队列

          delayed-output:
            producer:
              exchange-type: topic
              declare-exchange: false
              bind-queue: false
              routing-key-expression: "'delayed.routing.key'" # 静态路由键

          direct-output:
            producer:
              exchange-type: direct # 消息模式：direct
              declare-exchange: false
              bind-queue: false
              routing-key-expression: "'direct.routing.key'" # 静态路由键

          topic-output:
            producer:
              exchange-type: topic
              declare-exchange: false
              bind-queue: false
              routing-key-expression: headers['routingKey'] # 动态路由键